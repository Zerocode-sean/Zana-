[tool:pytest]
# Pytest configuration for Zana

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum coverage percentage
addopts = 
    --strict-markers
    --cov-fail-under=70
    --cov-report=term-missing
    --cov-report=html

markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    webhook: Webhook tests

# Coverage configuration
[coverage:run]
source = 
    agents
    database
    tools
    webhook
    config
omit =
    */tests/*
    */test_*.py
    */__init__.py

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
